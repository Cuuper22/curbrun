name: Android

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Build, test, and lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify bundled curb database
        shell: bash
        run: |
          test -s app/src/main/assets/curbrun.sqlite
          python3 scripts/validate_curb_db.py --db app/src/main/assets/curbrun.sqlite --report build/curb-db-validation.json

      - name: Run data pipeline unit tests
        run: python3 -m unittest discover -s scripts -p "test_*.py"

      - name: Build APK, run unit tests, and lint
        run: ./gradlew :app:assembleDebug testDebugUnitTest :app:lintDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: curbrun-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: curbrun-lint-report
          path: app/build/reports/lint-results-debug.html

      - name: Upload curb database validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: curbrun-db-validation
          path: build/curb-db-validation.json
